<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Carro Compartilhado</title>

<style>
body { font-family: Arial; background:#111; color:#fff; margin:0 }
.card { padding:12px; border-radius:10px; margin-bottom:10px }
</style>
</head>

<body>
<div id="root"></div>
<div id="toast"></div>

<script>

// CONFIG
const VEICULO_PLACA = 'UBM7J28'

// =============================
// TOAST
// =============================
function toast(msg){
  console.log(msg)
}

// =============================
// 🔥 RODÍZIO (ALERTA)
// =============================
function verificarRodizioHoje(){
  const final = VEICULO_PLACA.slice(-1)
  const dia = new Date().getDay()

  const mapa = {
    1:['1','2'],
    2:['3','4'],
    3:['5','6'],
    4:['7','8'],
    5:['9','0']
  }

  if(mapa[dia]?.includes(final)){
    const msg = `🚫 Rodízio hoje - final ${final}`
    toast(msg)
    setTimeout(()=>alert(msg),500)
  }
}

// =============================
// 🔥 RODÍZIO (DATA)
// =============================
function ehRodizioData(dataStr){
  const final = VEICULO_PLACA.slice(-1)
  const d = new Date(dataStr)
  const dia = d.getDay()

  const mapa = {
    1:['1','2'],
    2:['3','4'],
    3:['5','6'],
    4:['7','8'],
    5:['9','0']
  }

  return mapa[dia]?.includes(final)
}

// =============================
// RENDER CALENDÁRIO
// =============================
function render(){

  const hoje = new Date()
  const ano = hoje.getFullYear()
  const mes = hoje.getMonth()

  let html = ''

  // 🔥 AVISO TOPO
  if(ehRodizioData(new Date().toISOString())){
    html += `
      <div class="card" style="background:#300">
        🚫 Rodízio ativo hoje (final ${VEICULO_PLACA.slice(-1)})
      </div>
    `
  }

  html += '<div>CALENDÁRIO</div>'

  for(let d=1; d<=30; d++){

    const data = `${ano}-${String(mes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`

    const rodizio = ehRodizioData(data)

    html += `
      <div class="card" style="
        background:${rodizio ? '#500' : '#222'};
      ">
        Dia ${d} ${rodizio ? '🚫 Rodízio' : ''}
      </div>
    `
  }

  document.getElementById('root').innerHTML = html
}

// =============================
// INIT
// =============================
render()
verificarRodizioHoje()

</script>
</body>
</html>
