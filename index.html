<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#111111" />
  <title>Carro Compartilhado</title>

  <style>
    body { margin:0; font-family:Arial; background:#111; color:#fff }
    .card { padding:12px; margin-bottom:10px; border-radius:10px }
  </style>
</head>

<body>
<div id="root"></div>
<div id="toast"></div>

<script>

// ================= CONFIG =================
const VEICULO_PLACA = 'UBM7J28'

// ================= TOAST =================
function toast(msg){
  console.log(msg)
}

// ================= RODÍZIO =================
function verificarRodizioHoje() {
  const final = VEICULO_PLACA.slice(-1)
  const diaSemana = new Date().getDay()

  const mapa = {
    1:['1','2'],
    2:['3','4'],
    3:['5','6'],
    4:['7','8'],
    5:['9','0']
  }

  if(mapa[diaSemana]?.includes(final)){
    const msg = `🚫 Rodízio ativo hoje (final ${final})`
    toast(msg)
    setTimeout(()=>alert(msg),500)
  }
}

function ehRodizioData(dataStr){
  const final = VEICULO_PLACA.slice(-1)
  const d = new Date(dataStr + 'T12:00')
  const diaSemana = d.getDay()

  const mapa = {
    1:['1','2'],
    2:['3','4'],
    3:['5','6'],
    4:['7','8'],
    5:['9','0']
  }

  return mapa[diaSemana]?.includes(final)
}

// ================= CALENDÁRIO =================
function render(){

  const hoje = new Date()
  const ano = hoje.getFullYear()
  const mes = hoje.getMonth()

  let html = ''

  // 🔴 AVISO TOPO
  if(ehRodizioData(new Date().toISOString().slice(0,10))){
    html += `
      <div class="card" style="background:#300">
        🚫 Rodízio ativo hoje (placa final ${VEICULO_PLACA.slice(-1)})
      </div>
    `
  }

  html += `<h3>Calendário</h3>`

  for(let d=1; d<=31; d++){

    const data = `${ano}-${String(mes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`

    const rodizio = ehRodizioData(data)

    html += `
      <div class="card" style="background:${rodizio ? '#500' : '#222'}">
        Dia ${d} ${rodizio ? '🚫 Rodízio' : ''}
      </div>
    `
  }

  document.getElementById('root').innerHTML = html
}

// ================= INIT =================
render()
verificarRodizioHoje()

</script>
</body>
</html>
