<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#111111" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Carro" />
  <title>Carro Compartilhado</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f2f2f0; --surface: #ffffff; --border: rgba(0,0,0,0.09);
      --text: #111111; --muted: #666; --hint: #aaa;
      --blue: #185FA5; --blue-bg: #e6f1fb; --blue-border: #b3d4f0;
      --green: #2d6a0f; --green-bg: #eaf3de; --green-border: #b6d98a;
      --amber: #7a4800; --amber-bg: #faeeda; --amber-border: #f0c07a;
      --red: #8b1f1f; --red-bg: #fcebeb; --red-border: #f0a0a0;
      --orange: #8b4000; --orange-bg: #fff0e0; --orange-border: #ffb566;
      --r: 12px; --rsm: 8px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111; --surface: #1c1c1e; --border: rgba(255,255,255,0.1);
        --text: #f0f0f0; --muted: #aaa; --hint: #555;
        --blue: #5ba3e0; --blue-bg: #0c2d4a; --blue-border: #1a4a70;
        --green: #6abf3a; --green-bg: #1a3a0a; --green-border: #2d6a0f;
        --amber: #e8a030; --amber-bg: #3a2500; --amber-border: #7a4800;
        --red: #e06060; --red-bg: #3a1010; --red-border: #8b1f1f;
        --orange: #ffb566; --orange-bg: #3a1a00; --orange-border: #8b4000;
      }
    }
    html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 15px; -webkit-font-smoothing: antialiased; }
    #root { height: 100%; display: flex; flex-direction: column; width: 100%; max-width: 480px; margin: 0 auto; background: var(--bg); overflow: hidden; }
    .screen { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    .topbar { display: flex; align-items: center; gap: 10px; padding: 14px 16px 12px; background: var(--surface); border-bottom: 0.5px solid var(--border); flex-shrink: 0; padding-top: max(14px, env(safe-area-inset-top, 14px)); }
    .topbar-back { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--blue); padding: 0 4px; line-height: 1; flex-shrink: 0; }
    .topbar-info { flex: 1; min-width: 0; }
    .topbar-title { font-size: 17px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .topbar-sub { font-size: 12px; color: var(--muted); margin-top: 1px; }
    .scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; min-height: 0; }
    .content { padding: 12px 12px 40px; }
    .card { background: var(--surface); border-radius: var(--r); border: 0.5px solid var(--border); padding: 12px 14px; margin-bottom: 8px; }
    .card-tap { cursor: pointer; }
    .card-tap:active { opacity: 0.7; }
    .badge { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 100px; font-size: 11px; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
    .badge-blue { background: var(--blue-bg); color: var(--blue); }
    .badge-green { background: var(--green-bg); color: var(--green); }
    .badge-amber { background: var(--amber-bg); color: var(--amber); }
    .badge-red { background: var(--red-bg); color: var(--red); }
    .badge-gray { background: var(--bg); color: var(--muted); border: 0.5px solid var(--border); }
    .badge-orange { background: var(--orange-bg); color: var(--orange); }
    .btn { display: block; width: 100%; padding: 14px; border-radius: var(--rsm); border: 0.5px solid var(--border); background: var(--surface); font-size: 15px; font-weight: 600; color: var(--text); cursor: pointer; text-align: center; -webkit-tap-highlight-color: transparent; }
    .btn + .btn { margin-top: 8px; }
    .btn-primary { background: var(--text); color: var(--bg); border-color: var(--text); }
    .btn-green { background: var(--green-bg); color: var(--green); border-color: var(--green-border); }
    .btn-red { background: var(--red-bg); color: var(--red); border-color: var(--red-border); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .lbl { font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 5px; display: block; text-transform: uppercase; letter-spacing: 0.04em; }
    .fg { margin-bottom: 14px; }
    input, select, textarea { width: 100%; padding: 11px 13px; border: 0.5px solid var(--border); border-radius: var(--rsm); background: var(--surface); color: var(--text); font-size: 15px; font-family: inherit; -webkit-appearance: none; appearance: none; outline: none; }
    input:focus, select:focus, textarea:focus { border-color: var(--blue); }
    .sec-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin: 16px 0 8px; }
    .nav-tabs { display: flex; background: var(--surface); border-bottom: 0.5px solid var(--border); flex-shrink: 0; }
    .nav-tab { flex: 1; padding: 11px 4px; font-size: 13px; font-weight: 600; color: var(--muted); border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; -webkit-tap-highlight-color: transparent; }
    .nav-tab.active { color: var(--text); border-bottom-color: var(--text); }
    .chk-item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-bottom: 0.5px solid var(--border); cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .chk-item:last-child { border-bottom: none; }
    .chk-circle { width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; transition: all 0.15s; }
    .chk-circle.on { background: var(--green); border-color: var(--green); }
    .chk-text { font-size: 14px; flex: 1; }
    .chk-text.done { color: var(--muted); text-decoration: line-through; }
    .photo-zone { border: 2px dashed var(--border); border-radius: var(--r); padding: 24px 16px; text-align: center; cursor: pointer; margin-bottom: 10px; background: var(--surface); -webkit-tap-highlight-color: transparent; }
    .photo-zone.ok { border-style: solid; border-color: var(--green); background: var(--green-bg); }
    .pz-icon { font-size: 26px; margin-bottom: 5px; }
    .pz-lbl { font-size: 13px; color: var(--muted); }
    .photo-zone.ok .pz-lbl { color: var(--green); font-weight: 600; }
    .photo-preview { width: 100%; border-radius: var(--rsm); margin-bottom: 6px; max-height: 160px; object-fit: cover; display: none; }
    .car-hero { background: var(--surface); border-radius: var(--r); padding: 14px; margin-bottom: 14px; display: flex; align-items: center; gap: 12px; border: 0.5px solid var(--border); }
    .row-between { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .metric { background: var(--surface); border-radius: var(--rsm); border: 0.5px solid var(--border); padding: 11px 13px; }
    .metric-val { font-size: 20px; font-weight: 700; color: var(--text); }
    .metric-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .empty { text-align: center; padding: 2rem 1rem; color: var(--muted); font-size: 14px; }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); padding: 10px 20px; border-radius: 100px; font-size: 13px; font-weight: 600; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; max-width: 90vw; }
    .toast.show { opacity: 1; }
    .input-file { display: none; }
    .progress { height: 4px; background: var(--blue-bg); border-radius: 2px; overflow: hidden; margin-bottom: 14px; }
    .progress-bar { height: 100%; background: var(--blue); border-radius: 2px; transition: width 0.3s; }

    /* ── CALENDÁRIO ── */
    .cal-wrap { background: var(--surface); border-radius: var(--r); border: 0.5px solid var(--border); padding: 12px; margin-bottom: 10px; overflow: hidden; }
    .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .cal-month-title { font-size: 15px; font-weight: 700; color: var(--text); }
    .cal-nav { background: none; border: 0.5px solid var(--border); border-radius: var(--rsm); width: 32px; height: 32px; cursor: pointer; font-size: 17px; color: var(--text); display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; width: 100%; }
    .cal-dow { text-align: center; font-size: 9px; font-weight: 700; color: var(--muted); padding: 3px 0 5px; text-transform: uppercase; }
    .cal-day { aspect-ratio: 1; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; border: 1.5px solid transparent; font-size: 12px; font-weight: 600; line-height: 1; position: relative; -webkit-tap-highlight-color: transparent; min-width: 0; }
    .cal-day.empty { pointer-events: none; }
    .cal-day.past { color: var(--hint); pointer-events: none; background: none; }
    .cal-day.livre { background: var(--green-bg); color: var(--green); }
    .cal-day.parcial { background: var(--amber-bg); color: var(--amber); }
    .cal-day.cheio { background: var(--red-bg); color: var(--red); pointer-events: none; }
    .cal-day.rodizio { outline: 2px solid var(--orange); outline-offset: -2px; }
    .cal-day.hoje { border-color: var(--blue) !important; }
    .cal-day.selecionado { border-color: var(--blue) !important; box-shadow: 0 0 0 2px rgba(24,95,165,0.2); }
    .cal-dot { width: 4px; height: 4px; border-radius: 50%; margin-top: 2px; }
    .cal-legend { display: flex; flex-wrap: wrap; gap: 8px 14px; margin-top: 10px; padding-top: 10px; border-top: 0.5px solid var(--border); }
    .cal-leg-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--muted); }
    .cal-leg-box { width: 11px; height: 11px; border-radius: 3px; flex-shrink: 0; }

    /* ── AVISO RODÍZIO ── */
    .rodizio-banner { background: var(--orange-bg); border: 1px solid var(--orange-border); border-radius: var(--rsm); padding: 10px 13px; margin-bottom: 10px; display: flex; align-items: flex-start; gap: 9px; }
    .rodizio-banner-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
    .rodizio-banner-text { flex: 1; }
    .rodizio-banner-title { font-size: 13px; font-weight: 700; color: var(--orange); margin-bottom: 2px; }
    .rodizio-banner-sub { font-size: 12px; color: var(--orange); line-height: 1.4; opacity: 0.85; }

    .conflict-box { background: var(--red-bg); border: 1px solid var(--red-border); border-radius: var(--rsm); padding: 11px 13px; margin-bottom: 12px; font-size: 13px; color: var(--red); line-height: 1.5; }
    .conflict-box strong { display: block; font-size: 14px; margin-bottom: 3px; }
    .slot-item { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--rsm); padding: 10px 12px; margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between; gap: 8px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body>
<div id="root"></div>
<div class="toast" id="toast"></div>
<script type="module">
// ============================================================
// ⚙️  CONFIGURE AQUI
// ============================================================
const SUPABASE_URL = 'https://yuvamwfjzqvnsbxxrrof.supabase.co'
const SUPABASE_ANON_KEY = 'sb_publishable_Ni5QYAOgKHyD2Ot9S-UfLQ_oXJjSgK_'
const VEICULO_MODELO = 'Chevrolet Onix 2026'
const VEICULO_PLACA = 'UBM7J28'      // placa final 8 → rodízio na Quinta - Feira... ajuste se necessário
const VEICULO_FIM = Mai/2026'
// ============================================================

import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
const isConfigured = !SUPABASE_URL.includes('SEU_PROJETO')

const CHECKLIST = ['Pneus sem avarias','Lataria sem novos danos','Vidros e espelhos OK','Documentos no veículo','Combustível verificado','Limpeza interna OK','Cinto de segurança OK','Extintor presente']
const COMBUSTIVEIS = ['Tanque cheio ✅','3/4','Meio tanque','1/4','Reserva ⚠️']
const DIAS = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb']
const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro']

// Rodízio SP: final da placa → dia da semana (0=Dom,1=Seg,...,5=Sex,6=Sáb)
const RODIZIO = { '1':1,'2':1, '3':2,'4':2, '5':3,'6':3, '7':4,'8':4, '9':5,'0':5 }
const placaFinal = VEICULO_PLACA.slice(-1)
const diaSemanaRodizio = RODIZIO[placaFinal] // 4 = quinta
const NOMES_DIA = ['domingo','segunda-feira','terça-feira','quarta-feira','quinta-feira','sexta-feira','sábado']

function isRodizio(dateStr) {
  const d = new Date(dateStr + 'T12:00')
  return d.getDay() === diaSemanaRodizio
}

const toast = msg => { const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2800) }
const today = () => new Date().toISOString().slice(0,10)
const now = () => new Date().toISOString()
const fmtLong = d => new Date(d+'T12:00').toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'})
const fmtShort = d => new Date(d+'T12:00').toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'2-digit'})
const statusBadge = s => { const m={confirmada:['badge-blue','Reservado'],em_uso:['badge-amber','Em uso'],concluida:['badge-green','Concluído'],cancelada:['badge-gray','Cancelado']}; const [c,l]=m[s]||['badge-gray',s]; return `<span class="badge ${c}">${l}</span>` }

function temConflito(reservas, data, ini, fim, ignorarId=null) {
  return reservas.filter(r => r.data===data && r.status!=='cancelada' && r.id!==ignorarId && ini < r.hora_retorno.slice(0,5) && fim > r.hora_saida.slice(0,5))
}
function statusDia(reservas, d) {
  const ativas = reservas.filter(r => r.data===d && r.status!=='cancelada')
  if (!ativas.length) return 'livre'
  if (temConflito(reservas,d,'00:00','23:59').length >= 2) return 'cheio'
  return 'parcial'
}

let state = {
  screen:'login', tab:'calendario',
  colaborador:null, colaboradores:[], reservas:[],
  currentReserva:null, currentRegistro:null,
  checklistIn:{}, checklistOut:{},
  fotosIn:{}, fotosOut:{},
  loading:false,
  calYear:new Date().getFullYear(), calMonth:new Date().getMonth(),
  calDia:today(), _conflitos:[]
}

function setState(patch) { Object.assign(state,patch); render() }

function render() {
  const screens = { login, home, novaReserva, minhaReserva, checkin, checkout, resumo, painel }
  document.getElementById('root').innerHTML = (screens[state.screen]||(() =>''))()
  bindEvents()
}

// ── BANNER RODÍZIO ────────────────────────────────────────────
function rodizioHtml(dateStr) {
  if (!isRodizio(dateStr)) return ''
  return `<div class="rodizio-banner">
    <div class="rodizio-banner-icon">🚫</div>
    <div class="rodizio-banner-text">
      <div class="rodizio-banner-title">Rodízio Municipal — Atenção!</div>
      <div class="rodizio-banner-sub">Este veículo (placa final <strong>${placaFinal}</strong>) está sujeito ao rodízio toda <strong>${NOMES_DIA[diaSemanaRodizio]}</strong> das 7h–10h e 17h–20h na Área Central de SP. Verifique se o destino é afetado.</div>
    </div>
  </div>`
}

// ── LOGIN ─────────────────────────────────────────────────────
function login() {
  return `<div class="screen">
  <div class="scroll"><div class="content" style="padding-top:48px">
    <div style="text-align:center;margin-bottom:28px">
      <div style="font-size:48px;margin-bottom:10px">🚗</div>
      <div style="font-size:21px;font-weight:700">Carro Compartilhado</div>
      <div style="font-size:12px;color:var(--muted);margin-top:4px">${VEICULO_MODELO} · ${VEICULO_PLACA} · até ${VEICULO_FIM}</div>
    </div>
    <div class="fg"><label class="lbl">Quem é você?</label>
      <select id="sel-col"><option value="">Selecione seu nome...</option>
        ${state.colaboradores.map(c=>`<option value="${c.id}">${c.nome}${c.cargo?' — '+c.cargo:''}</option>`).join('')}
      </select>
    </div>
    <button class="btn btn-primary" id="btn-entrar">Entrar →</button>
    ${!state.colaboradores.length?`<div style="text-align:center;padding:1rem;color:var(--muted);font-size:13px">Carregando colaboradores...</div>`:''}
  </div></div></div>`
}

// ── HOME ──────────────────────────────────────────────────────
function home() {
  const ano=state.calYear, mes=state.calMonth, todayStr=today()
  const primeiroDia=new Date(ano,mes,1).getDay()
  const diasNoMes=new Date(ano,mes+1,0).getDate()

  let cel = DIAS.map(d=>`<div class="cal-dow">${d}</div>`).join('')
  for(let i=0;i<primeiroDia;i++) cel+=`<div class="cal-day empty"></div>`
  for(let d=1;d<=diasNoMes;d++){
    const ds=`${ano}-${String(mes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`
    const isPast=ds<todayStr, isToday=ds===todayStr, isSel=ds===state.calDia
    const isWeekend=(new Date(ds+'T12:00').getDay()===0||new Date(ds+'T12:00').getDay()===6)
    const isRod=isRodizio(ds)&&!isPast&&!isWeekend
    const st=isPast?'past':statusDia(state.reservas,ds)
    const dotColor={livre:'var(--green)',parcial:'var(--amber)',cheio:'var(--red)'}[st]||null
    const dot=!isPast&&st!=='livre'&&dotColor?`<div class="cal-dot" style="background:${dotColor}"></div>`:''
    const cls=['cal-day',isPast?'past':st,isToday?'hoje':'',isSel?'selecionado':'',isRod?'rodizio':''].filter(Boolean).join(' ')
    cel+=`<div class="${cls}" data-date="${ds}">${d}${dot}</div>`
  }

  const diaRes=state.reservas.filter(r=>r.data===state.calDia&&r.status!=='cancelada').sort((a,b)=>a.hora_saida.localeCompare(b.hora_saida))
  const minhaAtiva=state.reservas.find(r=>r.colaborador_nome===state.colaborador.nome&&['confirmada','em_uso'].includes(r.status))
  const isRodDia=isRodizio(state.calDia)&&new Date(state.calDia+'T12:00').getDay()!==0&&new Date(state.calDia+'T12:00').getDay()!==6

  return `<div class="screen">
  <div class="topbar">
    <div class="topbar-info">
      <div class="topbar-title">🚗 Carro Compartilhado</div>
      <div class="topbar-sub">Olá, ${state.colaborador.nome.split(' ')[0]} 👋</div>
    </div>
    <button class="btn" style="width:auto;padding:7px 11px;font-size:12px;flex-shrink:0" data-action="irPainel">Painel</button>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab ${state.tab==='calendario'?'active':''}" data-tab="calendario">Calendário</button>
    <button class="nav-tab ${state.tab==='historico'?'active':''}" data-tab="historico">Histórico</button>
  </div>
  <div class="scroll"><div class="content">
    ${state.tab==='calendario'?`
      ${minhaAtiva?`<div class="card card-tap" style="border-color:var(--blue);background:var(--blue-bg);margin-bottom:8px" data-id="${minhaAtiva.id}" data-action="verReserva">
        <div class="row-between"><div>
          <div style="font-size:10px;font-weight:700;color:var(--blue);margin-bottom:3px;text-transform:uppercase;letter-spacing:0.05em">Sua reserva ativa</div>
          <div style="font-size:15px;font-weight:700">${minhaAtiva.hora_saida.slice(0,5)} – ${minhaAtiva.hora_retorno.slice(0,5)}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:1px">${fmtShort(minhaAtiva.data)} · ${minhaAtiva.destino}</div>
        </div>${statusBadge(minhaAtiva.status)}</div>
      </div>`:''}
      <div class="cal-wrap">
        <div class="cal-header">
          <button class="cal-nav" id="cal-prev">‹</button>
          <div class="cal-month-title">${MESES[mes]} ${ano}</div>
          <button class="cal-nav" id="cal-next">›</button>
        </div>
        <div class="cal-grid">${cel}</div>
        <div class="cal-legend">
          <div class="cal-leg-item"><div class="cal-leg-box" style="background:var(--green-bg);border:1px solid var(--green)"></div>Livre</div>
          <div class="cal-leg-item"><div class="cal-leg-box" style="background:var(--amber-bg);border:1px solid var(--amber)"></div>Parcial</div>
          <div class="cal-leg-item"><div class="cal-leg-box" style="background:var(--red-bg);border:1px solid var(--red)"></div>Ocupado</div>
          <div class="cal-leg-item"><div class="cal-leg-box" style="outline:2px solid var(--orange);background:var(--orange-bg)"></div>Rodízio</div>
        </div>
      </div>
      ${isRodDia?rodizioHtml(state.calDia):''}
      <div class="sec-label">📅 ${fmtShort(state.calDia)}</div>
      ${diaRes.length===0
        ?`<div style="text-align:center;padding:12px;color:var(--muted);font-size:13px;background:var(--surface);border-radius:var(--rsm);border:0.5px solid var(--border)">Dia livre — nenhuma reserva 🟢</div>`
        :diaRes.map(r=>`<div class="slot-item card-tap" data-id="${r.id}" data-action="verReserva">
            <div style="min-width:0">

// ── MINHA RESERVA ─────────────────────────────────────────────

  else if(r.status==='em_uso'&&isMinha) actions=`<button class="btn btn-primary" data-action="irCheckout">🔁 Fazer check-out — Devolver carro</button>`

    <div class="car-hero">
      <div style="font-size:34px">🚗</div>

      <div style="font-size:16px;font-weight:700;margin-bottom:8px">${r.colaborador_nome}</div>

// ── Uploads ───────────────────────────────────────────────────
async function uploadFoto(file, path) {
  await sb.storage.from('fotos-veiculo').upload(path, file, { upsert: true })
  return sb.storage.from('fotos-veiculo').getPublicUrl(path).data.publicUrl
}

// ── API ───────────────────────────────────────────────────────
async function carregarColaboradores() { if(!isConfigured) return; const {data}=await sb.from('colaboradores').select('*').eq('ativo',true).order('nome'); if(data) setState({colaboradores:data}) }
async function carregarReservas() { if(!isConfigured) return; const {data}=await sb.from('reservas').select('*').order('data').order('hora_saida'); if(data) setState({reservas:data}) }
async function carregarRegistro(id) { if(!isConfigured) return; const {data}=await sb.from('registros_uso').select('*').eq('reserva_id',id).maybeSingle(); if(data) setState({currentRegistro:data}) }

// ── Fotos ─────────────────────────────────────────────────────
function bindPhoto(zoneId, fileId, prevId, key, store) {
  const zone=document.getElementById(zoneId), fi=document.getElementById(fileId); if(!zone||!fi) return
  zone.onclick=()=>fi.click()
  fi.onchange=e=>{
    const file=e.target.files[0]; if(!file) return
    const r=new FileReader(); r.onload=ev=>{
      const prev=document.getElementById(prevId); if(prev){prev.src=ev.target.result;prev.style.display='block'}
      store[key]=true; store['_file'+(key==='hodo'?'Hodo':'Frente')]=file
      zone.classList.add('ok')
      zone.querySelector('.pz-icon').textContent='✅'
      zone.querySelector('.pz-lbl').textContent='Foto registrada'
    }; r.readAsDataURL(file)
  }
}

// ── Events ────────────────────────────────────────────────────
function bindEvents() {
  // Login
  const btnE=document.getElementById('btn-entrar')
  if(btnE) btnE.onclick=()=>{ const sel=document.getElementById('sel-col'); if(!sel.value){toast('Selecione seu nome');return}; const c=state.colaboradores.find(x=>x.id===sel.value); if(!c) return; setState({colaborador:c,screen:'home'}); carregarReservas() }

  // Calendário
  const cp=document.getElementById('cal-prev'); if(cp) cp.onclick=()=>{ let m=state.calMonth-1,y=state.calYear; if(m<0){m=11;y--}; setState({calMonth:m,calYear:y}) }
  const cn=document.getElementById('cal-next'); if(cn) cn.onclick=()=>{ let m=state.calMonth+1,y=state.calYear; if(m>11){m=0;y++}; setState({calMonth:m,calYear:y}) }
  document.querySelectorAll('.cal-day[data-date]').forEach(el=>{
    el.onclick=()=>{ const d=el.dataset.date; if(!d) return; setState({calDia:d}) }
  })

  // Data muda na reserva → atualiza aviso rodízio
  const resData=document.getElementById('res-data')
  if(resData) resData.onchange=()=>{
    const d=resData.value
    const box=document.getElementById('rodizio-reserva')
    if(box) box.innerHTML=isRodizio(d)?rodizioHtml(d):''
  }

  // Nova reserva
  const btnR=document.getElementById('btn-res')
  if(btnR) btnR.onclick=async()=>{
    const data=document.getElementById('res-data').value
    const saida=document.getElementById('res-saida').value
    const retorno=document.getElementById('res-retorno').value
    const destino=document.getElementById('res-destino').value.trim()
    if(!data||!saida||!retorno||!destino){toast('Preencha todos os campos');return}
    if(saida>=retorno){toast('Retorno deve ser após a saída');return}
    const cf=temConflito(state.reservas,data,saida,retorno)
    if(cf.length){setState({_conflitos:cf});toast('⚠️ Conflito de horário!');return}
    setState({loading:true,_conflitos:[]})
    const nova={colaborador_id:state.colaborador.id,colaborador_nome:state.colaborador.nome,data,hora_saida:saida,hora_retorno:retorno,destino,status:'confirmada'}
    if(isConfigured){
      const {data:res,error}=await sb.from('reservas').insert(nova).select().single()
      if(error){toast('Erro: '+error.message);setState({loading:false});return}
      await carregarReservas(); setState({loading:false,screen:'minhaReserva',currentReserva:res,calDia:data})
    } else {
      const f={...nova,id:Date.now().toString()}; state.reservas.push(f); setState({loading:false,screen:'minhaReserva',currentReserva:f})
    }
    toast('Reserva confirmada!')
  }

  // Check-in
  const btnCI=document.getElementById('btn-ci')
  if(btnCI) btnCI.onclick=async()=>{
    const km=parseInt(document.getElementById('ci-km').value)
    const obs=document.getElementById('ci-obs').value
    if(!km){toast('Informe o km do hodômetro');return}
    if(Object.values(state.checklistIn).filter(Boolean).length<5){toast('Marque pelo menos 5 itens do checklist');return}
    setState({loading:true,kmIn:km,obsIn:obs})
    try{
      let uH=null,uF=null
      if(isConfigured){
        const ts=Date.now()
        if(state.fotosIn._fileHodo) uH=await uploadFoto(state.fotosIn._fileHodo,`${state.currentReserva.id}/hodo-in-${ts}.jpg`)
        if(state.fotosIn._fileFrente) uF=await uploadFoto(state.fotosIn._fileFrente,`${state.currentReserva.id}/frente-in-${ts}.jpg`)
        await sb.from('registros_uso').insert({reserva_id:state.currentReserva.id,colaborador_nome:state.colaborador.nome,checkin_at:now(),km_saida:km,foto_hodometro_saida:uH,foto_veiculo_saida:uF,checklist_saida:state.checklistIn,obs_saida:obs})
        await sb.from('reservas').update({status:'em_uso'}).eq('id',state.currentReserva.id)
        await carregarReservas()
      }
      setState({loading:false,screen:'minhaReserva',currentReserva:{...state.currentReserva,status:'em_uso'}})
      toast('Check-in feito! Boa viagem 🚗')
    }catch(e){toast('Erro: '+e.message);setState({loading:false})}
  }

  // Check-out
  const btnCO=document.getElementById('btn-co')
  if(btnCO) btnCO.onclick=async()=>{
    const km=parseInt(document.getElementById('co-km').value)
    const comb=document.getElementById('co-comb').value
    const obs=document.getElementById('co-obs').value
    if(!km){toast('Informe o km de retorno');return}
    if(Object.values(state.checklistOut).filter(Boolean).length<5){toast('Marque pelo menos 5 itens');return}
    setState({loading:true,kmOut:km,combustivel:comb,obsOut:obs})
    try{
      let uH=null,uF=null
      if(isConfigured){
        const ts=Date.now()
        if(state.fotosOut._fileHodo) uH=await uploadFoto(state.fotosOut._fileHodo,`${state.currentReserva.id}/hodo-out-${ts}.jpg`)
        if(state.fotosOut._fileFrente) uF=await uploadFoto(state.fotosOut._fileFrente,`${state.currentReserva.id}/frente-out-${ts}.jpg`)
        const {data:reg}=await sb.from('registros_uso').select('id').eq('reserva_id',state.currentReserva.id).maybeSingle()
        if(reg) await sb.from('registros_uso').update({checkout_at:now(),km_retorno:km,foto_hodometro_retorno:uH,foto_veiculo_retorno:uF,checklist_retorno:state.checklistOut,combustivel:comb,obs_retorno:obs}).eq('id',reg.id)
        await sb.from('reservas').update({status:'concluida'}).eq('id',state.currentReserva.id)
        const {data:rf}=await sb.from('registros_uso').select('*').eq('reserva_id',state.currentReserva.id).maybeSingle()
        await carregarReservas(); setState({loading:false,screen:'resumo',currentRegistro:rf})
      } else setState({loading:false,screen:'resumo',currentRegistro:{km_rodados:km-(state.kmIn||0),combustivel:comb}})
      toast('Devolução registrada!')
    }catch(e){toast('Erro: '+e.message);setState({loading:false})}
  }

  // Checklist
  document.querySelectorAll('[data-check]').forEach(el=>{
    el.onclick=()=>{ const i=parseInt(el.dataset.check); if(el.dataset.list==='in'){state.checklistIn[i]=!state.checklistIn[i];setState({})} else {state.checklistOut[i]=!state.checklistOut[i];setState({})} }
  })

  // Fotos
  bindPhoto('pz-hi','file-hi','prev-hi','hodo',state.fotosIn)
  bindPhoto('pz-fi','file-fi','prev-fi','frente',state.fotosIn)
  bindPhoto('pz-ho','file-ho','prev-ho','hodo',state.fotosOut)
  bindPhoto('pz-fo','file-fo','prev-fo','frente',state.fotosOut)

  // Actions
  document.querySelectorAll('[data-action]').forEach(el=>{
    if(el.dataset.bound) return; el.dataset.bound='1'
    el.onclick=async()=>{
      const a=el.dataset.action
      if(a==='irHome') setState({screen:'home',_conflitos:[]})
      else if(a==='irReservar') setState({screen:'novaReserva',_conflitos:[]})
      else if(a==='irCheckin'){state.checklistIn={};state.fotosIn={};setState({screen:'checkin'})}
      else if(a==='irCheckout'){state.checklistOut={};state.fotosOut={};setState({screen:'checkout'})}
      else if(a==='irMinha') setState({screen:'minhaReserva'})
      else if(a==='irPainel') setState({screen:'painel'})
      else if(a==='verReserva'){const r=state.reservas.find(x=>x.id===el.dataset.id);if(r){setState({currentReserva:r,currentRegistro:null,screen:'minhaReserva'});await carregarRegistro(r.id)}}
      else if(a==='cancelarReserva'){if(!confirm('Cancelar esta reserva?'))return;if(isConfigured)await sb.from('reservas').update({status:'cancelada'}).eq('id',state.currentReserva.id);await carregarReservas();setState({screen:'home'});toast('Reserva cancelada')}
    }
  })

  // Tabs
  document.querySelectorAll('[data-tab]').forEach(el=>{ el.onclick=()=>setState({tab:el.dataset.tab}) })
}

render()
carregarColaboradores()
</script>
</body>
</html>
